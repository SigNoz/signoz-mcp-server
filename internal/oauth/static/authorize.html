<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorize SigNoz MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0c0e;
      --surface: #121317;
      --panel: #161922;
      --border: #1d212d;
      --input-bg: #1d212d;
      --ink: #e5e7eb;
      --ink-secondary: #c0c1c3;
      --muted: #787a80;
      --accent: #4e74f8;
      --accent-hover: #6388ff;
      --accent-glow: rgba(78, 116, 248, 0.15);
      --orange: #e75536;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", -apple-system, "Segoe UI", sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(78, 116, 248, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(231, 85, 54, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.015) 1px, transparent 0);
      background-size: 100% 100%, 100% 100%, 24px 24px;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Top bar */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
    }

    .logo svg {
      width: 28px;
      height: 28px;
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .help-link-top {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .help-link-top:hover {
      color: var(--ink);
    }

    .help-link-top svg {
      width: 16px;
      height: 16px;
    }

    /* Main content */
    .auth-container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .auth-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, rgba(78, 116, 248, 0.15), rgba(78, 116, 248, 0.05));
      border: 1px solid rgba(78, 116, 248, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-icon svg {
      width: 24px;
      height: 24px;
      color: var(--accent);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--ink-secondary);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* Form card */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      text-align: left;
    }

    .client-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 22px;
      padding: 6px 12px;
      border-radius: 6px;
      background: rgba(78, 116, 248, 0.08);
      border: 1px solid rgba(78, 116, 248, 0.15);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 500;
    }

    .client-badge svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--muted);
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field-hint {
      margin-top: 6px;
    }

    .field-hint a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .field-hint a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    button[type="submit"] {
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 11px 16px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }

    button[type="submit"] svg {
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
    }

    button[type="submit"]:hover svg {
      transform: translateX(2px);
    }

    /* Security note */
    .security-note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .security-note svg {
      width: 16px;
      height: 16px;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .security-note p {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    /* Footer */
    .footer {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: var(--ink-secondary);
    }

    .footer .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 520px) {
      .card { padding: 20px; }
      h1 { font-size: 1.25rem; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <a href="https://signoz.io" class="logo" target="_blank" rel="noopener">
      <svg viewBox="0 0 21 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect y="0.5" width="21" height="21" rx="4.2" fill="url(#g1)"/>
        <path fill-rule="evenodd" clip-rule="evenodd" d="M2.31 10.99l.002-.005.002-.003.002-.008a4.5 4.5 0 01.097-.325c.069-.188.182-.448.364-.76.363-.623.998-1.445 2.089-2.3 1.097-.86 2.162-1.322 2.957-1.57a7.5 7.5 0 01.963-.234c.117-.02.21-.032.276-.04l.097-.007.026-.002h.002l.028.466.027.465h-.001l-.011.001-.044.005-.068.005a6 6 0 00-.224.032 6.5 6.5 0 00-.694.16l-.027.01c-.576.196-1.4.582-2.362 1.335-.96.751-1.5 1.46-1.798 1.973-.15.256-.239.465-.29.606a2.3 2.3 0 00-.052.16c-.005.016-.008.028-.01.036.002.008.005.02.01.036a2.3 2.3 0 00.343.802c.298.513.838 1.221 1.798 1.973.962.753 1.786 1.138 2.362 1.336l.027.009a6.5 6.5 0 00.694.16c.1.017.175.027.225.032l.067.005.045.005h.001l-.028.466-.027.465h-.003l-.001-.001-.004-.001a3.4 3.4 0 01-.11-.01 7.5 7.5 0 01-.963-.234c-.795-.248-1.86-.71-2.957-1.57-1.091-.854-1.726-1.676-2.089-2.3a5 5 0 01-.364-.76 4.5 4.5 0 01-.097-.325l-.002-.008-.001-.003-.001-.005V10.99z" fill="#fff"/>
        <path fill-rule="evenodd" clip-rule="evenodd" d="M18.69 10.99l-.001-.005-.001-.003-.002-.008a4.5 4.5 0 00-.097-.325 5 5 0 00-.364-.76c-.363-.623-.998-1.445-2.089-2.3-1.097-.86-2.162-1.322-2.957-1.57a7.5 7.5 0 00-.963-.234 5 5 0 00-.276-.04l-.097-.007-.026-.002h-.002l-.028.466-.027.465h.001l.011.001.044.005.068.005a6 6 0 01.224.032 6.5 6.5 0 01.694.16l.027.01c.576.196 1.4.582 2.362 1.335.96.751 1.5 1.46 1.798 1.973.15.256.239.465.29.606a2.3 2.3 0 01.052.16c.005.016.008.028.01.036a2.3 2.3 0 01-.052.16 2.3 2.3 0 01-.29.606c-.298.513-.838 1.221-1.798 1.973-.962.753-1.786 1.138-2.362 1.336l-.027.009a6.5 6.5 0 01-.694.16 6 6 0 01-.225.032l-.067.005-.045.005h-.001l.028.466.027.465h.003l.001-.001.004-.001a3.4 3.4 0 00.11-.01 7.5 7.5 0 00.963-.234c.795-.248 1.86-.71 2.957-1.57 1.091-.854 1.726-1.676 2.089-2.3a5 5 0 00.364-.76c.034-.094.057-.17.073-.225a2 2 0 00.024-.1l.002-.008.001-.003.001-.005V10.99z" fill="#fff"/>
        <path fill-rule="evenodd" clip-rule="evenodd" d="M14.35 11c0 2.067-1.664 3.743-3.717 3.743S6.918 13.067 6.918 11s1.664-3.744 3.716-3.744c2.053 0 3.717 1.676 3.717 3.744zM9.705 8.894s-.446.526-.58.936a3.4 3.4 0 00-.116.702H7.847s0-.351.232-.936c.232-.585.465-.702.465-.702h1.161zm-.58 3.276c.133.409.58.935.58.935H8.544s-.233-.117-.465-.702c-.232-.585-.232-.936-.232-.936h1.161s.03.438.117.703z" fill="#fff"/>
        <defs>
          <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(10.5 11) rotate(45.69) scale(12.326)">
            <stop offset=".33" stop-color="#FF5E19"/>
            <stop offset="1" stop-color="#FF2929"/>
          </radialGradient>
        </defs>
      </svg>
      <span class="logo-text">SigNoz</span>
    </a>
    <a href="https://signoz.io/support/" target="_blank" rel="noopener" class="help-link-top">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M12 18h.01"/><circle cx="12" cy="12" r="9.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Get Help
    </a>
  </header>

  <!-- Auth content -->
  <main class="auth-container">
    <div class="auth-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
    </div>
    <h1>Authorize access</h1>
    <p class="subtitle">Enter the SigNoz instance URL and API key you want this MCP client to use.</p>

    <div class="card">
      <div class="client-badge">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/></svg>
        Client: {{.ClientName}}
      </div>

      <form method="post" action="{{.AuthorizePath}}">
        <div class="field">
          <label for="signoz_url">SigNoz Instance URL</label>
          <input id="signoz_url" name="signoz_url" type="text" placeholder="https://your-signoz-instance" required>
        </div>

        <div class="field">
          <label for="api_key">API Key</label>
          <input id="api_key" name="api_key" type="password" placeholder="Paste your SigNoz API key" required>
          <div class="field-hint">
            <a href="https://signoz.io/docs/ai/signoz-mcp-server/#get-your-api-key" target="_blank" rel="noopener">How to get your API key? →</a>
          </div>
        </div>

        <input type="hidden" name="client_id" value="{{.ClientID}}">
        <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
        <input type="hidden" name="state" value="{{.State}}">
        <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
        <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
        <input type="hidden" name="scope" value="{{.Scope}}">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <button type="submit">
          Authorize
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </button>
      </form>
    </div>

    <!-- Security note -->
    <div class="security-note">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
      <p>Your credentials stay within the SigNoz MCP server and are exchanged for scoped OAuth tokens.</p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://signoz.io" target="_blank" rel="noopener">signoz.io</a>
      <span class="dot"></span>
      <a href="https://signoz.io/docs/ai/signoz-mcp-server/" target="_blank" rel="noopener">Docs</a>
      <span class="dot"></span>
      <a href="https://github.com/SigNoz/signoz-mcp-server" target="_blank" rel="noopener">GitHub</a>
    </div>
  </main>

</body>
</html>
